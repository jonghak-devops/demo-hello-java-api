name: Build

on:
  push:
    branches:
      - main

jobs:
  java-build:
    name: Build Java Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '25'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Run build with Gradle Wrapper
        run: ./gradlew test build
      - name: Upload Test Reports
        if: failure() # Only upload if the previous step (build/test) failed
        uses: actions/upload-artifact@v6
        with:
          name: test-reports
          path: |
            **/build/reports/problems/
            **/build/reports/tests/
            **/build/test-results/
      - name: Upload Build Reports
        uses: actions/upload-artifact@v6
        with:
          name: build-reports
          path: |
            **/build/reports/
      - name: Set Application Version
        id: version
        run: |
          echo "APPLICATION_VERSION=$(${{ github.workspace }}/gradlew -q properties | grep ^version: | awk '{print $2}')" >> $GITHUB_OUTPUT
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:${{ steps.version.outputs.APPLICATION_VERSION }}
